version: '3.8'
services:
  db:
    image: postgres:18-alpine
    container_name: green-algeria-db
    environment:
      POSTGRES_USER: greenalgeria
      POSTGRES_PASSWORD: greenalgeria
      POSTGRES_DB: greenalgeria
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
