name: CI E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-nestjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: backend-nestjs
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build frontend
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nestjs
          path: frontend/playwright-report/
          retention-days: 7

  e2e-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          cache-dependency-path: backend-springboot/pom.xml
      - name: Build backend (Spring Boot)
        run: ./mvnw -DskipTests clean package -q
        working-directory: backend-springboot
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build frontend (Spring Boot backend)
        run: pnpm build
        env:
          VITE_API_BACKEND: spring
          VITE_API_URL: http://localhost:8081
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Run E2E tests (Spring Boot)
        run: pnpm test:e2e:spring
        env:
          CI: 'true'
          E2E_AUTH_BASE: 'http://localhost:8081/api/auth'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-springboot
          path: frontend/playwright-report/
          retention-days: 7

  e2e-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum
      - name: Build backend (Go)
        run: go build -ldflags="-s -w" -o backend-go ./cmd/api
        working-directory: backend-go
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build frontend (Go backend)
        run: pnpm build
        env:
          VITE_API_URL: http://localhost:8082
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Run E2E tests (Go)
        run: pnpm test:e2e:go
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-go
          path: frontend/playwright-report/
          retention-days: 7
