name: CI E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e-nestjs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: greenalgeria
          POSTGRES_PASSWORD: greenalgeria
          POSTGRES_DB: greenalgeria
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U greenalgeria -d greenalgeria"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 15
      rustfs:
        image: rustfs/rustfs:latest
        env:
          RUSTFS_VOLUMES: /data
          RUSTFS_ADDRESS: 0.0.0.0:9000
          RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
          RUSTFS_CONSOLE_ENABLE: 'true'
          RUSTFS_ACCESS_KEY: greenalgeria-access
          RUSTFS_SECRET_KEY: greenalgeria-secret-change-me
        ports:
          - '9000:9000'
          - '9001:9001'
        options: >-
          --health-cmd "wget -q --spider http://127.0.0.1:9000/ || exit 0"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Create RustFS bucket
        run: node scripts/create-bucket.mjs
        working-directory: backend-nestjs
        env:
          OO_OBJECT_STORAGE_ENDPOINT: 'http://localhost:9000'
          OO_OBJECT_STORAGE_BUCKET: 'e2e-test'
          OO_OBJECT_STORAGE_ACCESS_KEY: 'greenalgeria-access'
          OO_OBJECT_STORAGE_SECRET_KEY: 'greenalgeria-secret-change-me'
      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
        working-directory: backend-nestjs
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build frontend
        run: pnpm build
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nestjs
          path: frontend/playwright-report/
          retention-days: 7

  e2e-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: greenalgeria
          POSTGRES_PASSWORD: greenalgeria
          POSTGRES_DB: greenalgeria
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U greenalgeria -d greenalgeria"
          --health-interval 3s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          cache-dependency-path: backend-springboot/pom.xml
      - name: Build backend (Spring Boot)
        run: ./mvnw -DskipTests clean package -q
        working-directory: backend-springboot
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Build frontend (Spring Boot backend)
        run: pnpm build
        env:
          VITE_API_BACKEND: spring
          VITE_API_URL: http://localhost:8081
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
      - name: Run E2E tests (Spring Boot)
        run: pnpm test:e2e:spring
        env:
          CI: 'true'
          E2E_AUTH_BASE: 'http://localhost:8081/api/auth'
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-springboot
          path: frontend/playwright-report/
          retention-days: 7
