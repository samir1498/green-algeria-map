name: CI Backend Spring Boot

on:
  push:
    branches: [main]
    paths: ['backend-springboot/**', '.github/workflows/ci-backend-springboot.yml']
  pull_request:
    paths: ['backend-springboot/**', '.github/workflows/ci-backend-springboot.yml']

jobs:
  build-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-springboot
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: greenalgeria
          POSTGRES_USER: greenalgeria
          POSTGRES_PASSWORD: greenalgeria
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: graalvm
          cache: maven
      - run: ./mvnw clean package
