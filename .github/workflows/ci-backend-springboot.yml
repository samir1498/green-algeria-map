name: CI Backend Spring Boot

on:
  push:
    branches: [main]
    paths: ['backend-springboot/**', '.github/workflows/ci-backend-springboot.yml']
  pull_request:
    paths: ['backend-springboot/**', '.github/workflows/ci-backend-springboot.yml']

jobs:
  check-springboot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-springboot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: graalvm
          cache: maven
      - run: ./mvnw clean compile -q

  build-springboot:
    runs-on: ubuntu-latest
    needs: [check-springboot]
    defaults:
      run:
        working-directory: backend-springboot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: graalvm
          cache: maven
      - run: ./mvnw clean package -q
