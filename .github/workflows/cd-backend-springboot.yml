name: CD Backend Spring Boot

on:
  push:
    tags: ['backend-springboot-v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: backend-springboot

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: graalvm
          cache: maven
      - name: Run tests
        run: ./mvnw test -Ptest-it -q
      - name: Build native Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/green-algeria-map-backend
          ./mvnw -Pnative spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=$IMAGE_NAME:${{ github.ref_name }} \
            -q
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/green-algeria-map-backend
          docker tag $IMAGE_NAME:${{ github.ref_name }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.ref_name }}
          docker push $IMAGE_NAME:latest
