name: CD Backend Go

on:
  push:
    tags: ['backend-go-v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    working-directory: backend-go

jobs:
  docker:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend-go/go.sum
      - name: Run tests
        run: go test -short -count=1 ./internal/...
      - name: Build Docker image
        run: docker build -t backend-go:${{ github.ref_name }} .
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/green-algeria-map-backend-go
          docker tag backend-go:${{ github.ref_name }} $IMAGE_NAME:${{ github.ref_name }}
          docker tag backend-go:${{ github.ref_name }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.ref_name }}
          docker push $IMAGE_NAME:latest
