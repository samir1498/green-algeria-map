name: CI Backend

on:
  push:
    branches: [main]
    paths: ['backend-nestjs/**', '.github/workflows/ci-backend.yml']
  pull_request:
    paths: ['backend-nestjs/**', '.github/workflows/ci-backend.yml']

jobs:
  check:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm check

  lint:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm lint

  knip:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm knip
        env:
          NODE_OPTIONS: --max-old-space-size=8192

  depcruise:
    runs-on: ubuntu-slim
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm depcruise

  test-unit:
    runs-on: ubuntu-slim
    needs: [check, lint, knip]
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm test:unit

  test-it:
    runs-on: ubuntu-latest
    needs: [check, lint, knip]
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm test:it

  build:
    runs-on: ubuntu-slim
    needs: [test-unit, test-it]
    defaults:
      run:
        working-directory: backend-nestjs
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: backend-nestjs/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile --prefer-offline
      - run: pnpm build
