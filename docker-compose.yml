x-postgres: &postgres
  image: postgres:18-alpine
  environment:
    POSTGRES_USER: greenalgeria
    POSTGRES_PASSWORD: greenalgeria
    POSTGRES_DB: greenalgeria
  healthcheck:
    test: ['CMD-SHELL', 'pg_isready -U greenalgeria -d greenalgeria']
    interval: 3s
    timeout: 2s
    retries: 15

x-rustfs: &rustfs
  image: rustfs/rustfs:latest
  environment:
    RUSTFS_VOLUMES: /data
    RUSTFS_ADDRESS: 0.0.0.0:9000
    RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
    RUSTFS_CONSOLE_ENABLE: 'true'
    RUSTFS_ACCESS_KEY: greenalgeria-access
    RUSTFS_SECRET_KEY: greenalgeria-secret-change-me
  healthcheck:
    test: ['CMD-SHELL', 'wget -q --spider http://127.0.0.1:9000/ || exit 0']
    interval: 3s
    timeout: 2s
    retries: 10

services:
  postgres:
    <<: *postgres
    profiles: [nestjs, springboot]
    container_name: green-algeria-db
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'

  rustfs:
    <<: *rustfs
    profiles: [nestjs, springboot]
    container_name: green-algeria-rustfs
    volumes:
      - rustfs_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

  nestjs-app:
    profiles: [nestjs]
    container_name: green-algeria-nestjs
    build: ./backend-nestjs
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      CLIENT_URL: http://localhost:4173
      BETTER_AUTH_URL: http://localhost:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: greenalgeria
      DB_PASSWORD: greenalgeria
      DB_NAME: greenalgeria
      DATABASE_URL: postgresql://greenalgeria:greenalgeria@postgres:5432/greenalgeria
      OO_OBJECT_STORAGE_ENDPOINT: http://rustfs:9000
      OO_OBJECT_STORAGE_REGION: us-east-1
      OO_OBJECT_STORAGE_BUCKET: green-algeria
      OO_OBJECT_STORAGE_ACCESS_KEY: greenalgeria-access
      OO_OBJECT_STORAGE_SECRET_KEY: greenalgeria-secret-change-me

  springboot-app:
    profiles: [springboot]
    container_name: green-algeria-springboot
    build:
      context: ./backend-springboot
      dockerfile: Dockerfile
    ports:
      - '8081:8081'
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/greenalgeria
      SPRING_DATASOURCE_USERNAME: greenalgeria
      SPRING_DATASOURCE_PASSWORD: greenalgeria
      STORAGE_ENDPOINT: http://rustfs:9000
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: green-algeria
      STORAGE_ACCESS_KEY: greenalgeria-access
      STORAGE_SECRET_KEY: greenalgeria-secret-change-me
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4173

volumes:
  pgdata:
  rustfs_data: