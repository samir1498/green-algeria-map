services:
  postgres:
    image: postgres:18-alpine
    container_name: green-algeria-springboot-db
    environment:
      POSTGRES_USER: greenalgeria
      POSTGRES_PASSWORD: greenalgeria
      POSTGRES_DB: greenalgeria
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U greenalgeria -d greenalgeria']
      interval: 3s
      timeout: 2s
      retries: 15

volumes:
  pgdata:
