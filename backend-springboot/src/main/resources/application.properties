server.port=8081
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/greenalgeria}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:greenalgeria}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:greenalgeria}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.servlet.session.cookie.name=session_token
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

server.compression.enabled=true

spring.threads.virtual.enabled=true

spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.schemas=springboot
spring.flyway.create-schemas=true
spring.jpa.properties.hibernate.default_schema=springboot

management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.group.readiness.include=db,diskSpace,memory,storage
management.endpoint.health.group.readiness.additional-path=server:/readyz
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.liveness.additional-path=server:/healthz

spring.servlet.multipart.max-file-size=10MB

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

storage.endpoint=${STORAGE_ENDPOINT:http://localhost:9000}
storage.region=${STORAGE_REGION:us-east-1}
storage.bucket=${STORAGE_BUCKET:green-algeria}
storage.access-key=${STORAGE_ACCESS_KEY:greenalgeria-access}
storage.secret-key=${STORAGE_SECRET_KEY:greenalgeria-secret-change-me}