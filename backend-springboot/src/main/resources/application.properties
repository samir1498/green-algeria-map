server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/greenalgeria
spring.datasource.username=greenalgeria
spring.datasource.password=greenalgeria
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.servlet.session.cookie.name=session_token
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.schemas=springboot
spring.flyway.create-schemas=true
spring.jpa.properties.hibernate.default_schema=springboot

management.endpoints.web.base-path=/
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.health.group.readiness.include=db
management.endpoint.health.group.readiness.additional-path=server:/readyz
management.endpoint.health.group.liveness.include=ping
management.endpoint.health.group.liveness.additional-path=server:/healthz

spring.servlet.multipart.max-file-size=10MB

storage.endpoint=http://localhost:9000
storage.region=us-east-1
storage.bucket=green-algeria
storage.access-key=greenalgeria-access
storage.secret-key=greenalgeria-secret-change-me
